<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f4937">
    <title>Sin conexión · ABR Store</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f5;
        color: #202b25;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 440px;
        border: 1px solid #dde3de;
        border-radius: 24px;
        background: white;
        padding: 28px;
        box-shadow: 0 20px 60px rgb(20 32 26 / 10%);
      }

      .mark {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #eaf2ed;
        color: #1f4937;
        font-weight: 900;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #68746d;
        line-height: 1.55;
      }

      button {
        margin-top: 20px;
        width: 100%;
        border: 0;
        border-radius: 14px;
        background: #1f4937;
        color: white;
        padding: 12px 16px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ABR</div>
      <h1>Sin conexión</h1>
      <p>No pudimos conectar con el sistema. Revisa tu internet e inténtalo de nuevo. Las ventas y consultas requieren conexión con la base de datos.</p>
      <button type="button" onclick="window.location.reload()">Reintentar</button>
    </main>
  </body>
</html>
